# Local Git quality gates.
# Install once with: make hooks
# Run commit-stage hooks: make hooks-run
# Run push-stage hooks: make hooks-run-push

default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  # Use the project's uv environment so Ruff, Pyright, and pytest see the
  # exact dependency versions declared in pyproject.toml.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        files: '\.(py|pyi|ipynb)$'
        stages: [pre-commit]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        files: '\.(py|pyi|ipynb)$'
        stages: [pre-commit]

      - id: pyright
        name: pyright
        entry: uv run pyright cbramod_experiments main.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run python -m pytest tests -x -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit, pre-push]
      - id: debug-statements
        stages: [pre-commit]
      - id: check-added-large-files
        args: [--maxkb=500]
        stages: [pre-commit]
