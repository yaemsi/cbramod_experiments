data:
  path: data/processed/shu_mi.h5
  batch_size: 64
  num_workers: 16
  pin_memory: true
  persistent_workers: true

model:
  name: eegsimpleconv
  num_channels: 32
  num_classes: 2
  sampling_rate: 200
  window_seconds: 4.0
  pretrained: false
  classifier: avg_pool
  freeze_backbone: false
  kwargs:
    feature_maps: 128
    num_blocks: 2
    resampling_rate: 80
    kernel_size: 8
    activation: relu

training:
  epochs: 50
  lr: 0.001
  head_lr: null
  weight_decay: 0.0
  label_smoothing: 0.0
  grad_clip_norm: 0.0
  patience: 50
  seed: 3407
  amp: false
  output_dir: outputs/eegsimpleconv_shu_mi
  device: auto
  optimizer: adam
  scheduler: step
  scheduler_interval: epoch
  min_lr: 0.0
  lr_decay_epoch: 40
  lr_decay_gamma: 0.1
